# Publish to PyPI on version tags.
#
# Uses Trusted Publisher (OIDC) — no API token or secrets needed.
#
# Before first publish: go to pypi.org → your account → Publishing →
# "Add a new pending publisher" and fill in:
#   PyPI project name: apple-health-mcp
#   Owner:             smarzola
#   Repository:        apple-health-mcp
#   Workflow name:     publish.yml
#   Environment name:  pypi

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  smoke-test:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      # Give PyPI a moment to propagate the new version
      - run: sleep 10

      - run: uvx apple-health-mcp --help
