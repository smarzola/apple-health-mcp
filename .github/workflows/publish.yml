# Publish to PyPI on version tags, build-only on PRs.
#
# Uses Trusted Publisher (OIDC) — no API token or secrets needed.
#
# Before first publish: go to pypi.org → your account → Publishing →
# "Add a new pending publisher" and fill in:
#   PyPI project name: apple-health-mcp
#   Owner:             smarzola
#   Repository:        apple-health-mcp
#   Workflow name:     publish.yml
#   Environment name:  pypi

name: Publish to PyPI

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv run ruff check src/
      - run: uv run ruff format --check src/
      - run: uv run mypy src/

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
